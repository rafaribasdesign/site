<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Hero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      padding-bottom: 60px;
      overflow: hidden;
    }

    #physics-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* canvas só para debug - os elementos são DOM */
    }

    /* Cada pílula é um elemento DOM posicionado via Matter.js */
    .pill {
      position: absolute;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      white-space: nowrap;
      cursor: grab;
      user-select: none;
      pointer-events: none; /* controlado pelo mouse constraint do Matter.js */
      transform-origin: center center;
      will-change: transform;
    }

    .pill:active { cursor: grabbing; }

    /* Variações de cor */
    .pill-light   { background: #f0ede8; color: #0a0a0a; }
    .pill-dark    { background: #1a1a1a; color: #f0ede8; border: 1px solid #333; }
    .pill-accent  { background: #d4ff00; color: #0a0a0a; }
    .pill-muted   { background: #2a2a2a; color: #888; border: 1px solid #333; }

    /* Nome principal */
    .hero-name {
      position: relative;
      z-index: 10;
      padding-left: 40px;
      pointer-events: none;
    }

    .hero-name h1 {
      font-size: clamp(60px, 10vw, 140px);
      font-weight: 700;
      color: #f0ede8;
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .hero-name h1 span {
      display: block;
    }
  </style>
</head>
<body>

<section id="hero">
  <canvas id="physics-canvas"></canvas>

  <!-- Pílulas — serão posicionadas pelo Matter.js -->
  <div class="pill pill-light"  id="pill-0">Brand Designer</div>
  <div class="pill pill-accent" id="pill-1">Tokyo ✦</div>
  <div class="pill pill-dark"   id="pill-2">Creative Director</div>
  <div class="pill pill-muted"  id="pill-3">2024 ©</div>
  <div class="pill pill-light"  id="pill-4">Visual Identity</div>
  <div class="pill pill-dark"   id="pill-5">Motion</div>
  <div class="pill pill-accent" id="pill-6">UI / UX</div>
  <div class="pill pill-muted"  id="pill-7">Framer</div>
  <div class="pill pill-light"  id="pill-8">Typography</div>
  <div class="pill pill-dark"   id="pill-9">Art Direction</div>

  <div class="hero-name">
    <h1>
      <span>AKIO</span>
      <span>HIROSHI</span>
    </h1>
  </div>
</section>

<!-- Matter.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
(function () {
  const { Engine, Render, Runner, Bodies, Body, World, Mouse, MouseConstraint, Events, Composite } = Matter;

  const hero   = document.getElementById('hero');
  const canvas = document.getElementById('physics-canvas');

  let W = hero.clientWidth;
  let H = hero.clientHeight;

  canvas.width  = W;
  canvas.height = H;

  // ── Engine ──────────────────────────────────────────────────────────────
  const engine = Engine.create({ gravity: { y: 0.7 } });
  const world  = engine.world;

  // ── Paredes e chão ───────────────────────────────────────────────────────
  const wallOpts = { isStatic: true, friction: 0.3, restitution: 0.4 };
  const thickness = 60;

  let floor  = Bodies.rectangle(W / 2, H + thickness / 2, W * 2, thickness, wallOpts);
  let wallL  = Bodies.rectangle(-thickness / 2, H / 2, thickness, H * 2, wallOpts);
  let wallR  = Bodies.rectangle(W + thickness / 2, H / 2, thickness, H * 2, wallOpts);
  let ceiling= Bodies.rectangle(W / 2, -thickness / 2, W * 2, thickness, wallOpts);

  World.add(world, [floor, wallL, wallR, ceiling]);

  // ── Pílulas DOM → corpos físicos ─────────────────────────────────────────
  const pillEls = document.querySelectorAll('.pill');
  const pillBodies = [];

  pillEls.forEach((el, i) => {
    const rect = el.getBoundingClientRect();
    const w = rect.width  || 120;
    const h = rect.height || 38;

    // Posição inicial: dispersa no topo com leve aleatoriedade
    const x = 80 + (i % 5) * (W / 5) + Math.random() * 60 - 30;
    const y = -80 - Math.random() * 300;

    const body = Bodies.rectangle(x, y, w, h, {
      restitution: 0.5,   // elasticidade ao quicar
      friction:    0.4,
      frictionAir: 0.03, // resistência do ar (amortece movimento)
      chamfer:     { radius: h / 2 }, // bordas arredondadas = pílula
      label: `pill-${i}`,
    });

    // Velocidade angular inicial aleatória
    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.1);

    pillBodies.push({ body, el, w, h });
    World.add(world, body);
  });

  // ── Mouse Constraint (arrastar) ──────────────────────────────────────────
  const mouse = Mouse.create(hero);
  // Corrige escala caso o canvas tenha DPR diferente
  mouse.pixelRatio = window.devicePixelRatio || 1;

  const mc = MouseConstraint.create(engine, {
    mouse,
    constraint: {
      stiffness: 0.15,
      damping:   0.1,
      render:    { visible: false },
    },
  });

  World.add(world, mc);

  // Habilitar pointer-events nas pílulas apenas para o cursor
  hero.style.cursor = 'default';
  Events.on(mc, 'startdrag', () => { hero.style.cursor = 'grabbing'; });
  Events.on(mc, 'enddrag',   () => { hero.style.cursor = 'default'; });

  // ── Loop de animação (sincroniza DOM com físico) ─────────────────────────
  const runner = Runner.create();
  Runner.run(runner, engine);

  function syncDOM() {
    pillBodies.forEach(({ body, el, w, h }) => {
      const { x, y } = body.position;
      const angle     = body.angle;

      // Centraliza o elemento no ponto físico
      el.style.left      = `${x - w / 2}px`;
      el.style.top       = `${y - h / 2}px`;
      el.style.transform = `rotate(${angle}rad)`;
      el.style.pointerEvents = 'auto'; // libera interação após posicionar
    });

    requestAnimationFrame(syncDOM);
  }

  syncDOM();

  // ── Responsividade ────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    W = hero.clientWidth;
    H = hero.clientHeight;

    canvas.width  = W;
    canvas.height = H;

    Body.setPosition(floor,   { x: W / 2, y: H + thickness / 2 });
    Body.setPosition(wallR,   { x: W + thickness / 2, y: H / 2 });
    Body.setPosition(ceiling, { x: W / 2, y: -thickness / 2 });
  });

})();
</script>

</body>
</html>
